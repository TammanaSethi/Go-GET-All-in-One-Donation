<html>
    <head>
        <title>Registration form for user</title>
        <link rel="stylesheet" href="css/bootstrap.min.css"/>
        <link rel="stylesheet" href="css/bootstrap-grid.min.css"/>
        <link rel="stylesheet" href="register.css" />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    </head>
    <body>
        <div class="background-shape"></div>
        <div class="container">
        <div class="row ">
            <div class="col-lg-12 p-5 text-center ">
                <img src="images/logo-white (1).png"/>
            </div>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-6  text-white">
                <form>
                   <lable><i class="fa-solid fa-user"></i>&nbsp;&nbsp;User name</lable>
                    <input type="text" class="form-control" placeholder="Enter your name" id="box1" />
                    <br/>
                    <lable><i class="fa-solid fa-envelope"></i>&nbsp;&nbsp;Email</lable>
                    <input type="email" class="form-control" placeholder="Email id" id="box1" />
                    <br/>
                    <lable><i class="fa-solid fa-lock"></i>&nbsp;&nbsp;Password</lable>
                    <input type="Password" class="form-control" placeholder="Password" id="box1"/>
                    <br/>
                    <lable><i class="fa-solid fa-arrow-right"></i>&nbsp;Mobile</lable>
                    <input type="tel"  class="form-control" placeholder="Mobile no." id="box1" />
                    <br/>
                    <lable><i class="fa-solid fa-arrow-right"></i>&nbsp;Address</lable>
                    <input type="text" class="form-control" placeholder="Address" id="box1" />
                    <br/>
                    <lable><i class="fa-solid fa-arrow-right"></i>&nbsp;City</lable>
                    <input type="text" class="form-control" placeholder="City" id="box1"/>
                    <br/>
                    <lable><i class="fa-solid fa-arrow-right"></i>&nbsp;&nbsp;What is your pet animal name?</lable>
                    <input type="text" class="form-control" placeholder="Enter the answer" id="box1"/>
                    <br/>
                    <br/>
                    <lable><i class="fa-solid fa-arrow-right"></i>&nbsp;&nbsp;What is your school best friend name?</lable>
                    <input type="text" class="form-control" placeholder="Enter the answer" id="box1" />
                    <br/>
                </form>
             </div>
        </div>
        <div class="row justify-content-center text-center text-white ">
            <div class="col-lg-6 ps-5 d-grid">
              <button class="btn  ">Sign Up</button>
              <br/>
              <p>Already have an Account?&nbsp;Sign In</p>
             </div>

        </div>


        </div>
    </body>
</html>
